name: build-package

# Builds the Arch package (.pkg.tar.zst) in an Arch container.
# - push a tag  v*   -> builds and attaches the package to a GitHub Release
# - manual run (workflow_dispatch) -> builds and uploads as a workflow artifact
#
# The PKGBUILD is a VCS (-git) package: makepkg clones the repo's default branch
# (main) itself, so the built package reflects main HEAD. Tag main HEAD to
# release that exact state.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to attach assets to a Release

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install build + runtime deps
        run: |
          pacman -Syu --noconfirm --needed \
            git rust gcc python python-xlib libcap

      - name: Checkout (for the PKGBUILD)
        uses: actions/checkout@v4

      - name: Build package as non-root
        run: |
          useradd -m builder
          git config --global --add safe.directory '*'
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c '
            git config --global --add safe.directory "*"
            cd "'"$GITHUB_WORKSPACE"'/packaging"
            makepkg -f --noconfirm
          '

      - name: Collect artifact
        run: |
          mkdir -p out
          cp packaging/*.pkg.tar.zst out/
          ls -l out/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: out/*.pkg.tar.zst

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.pkg.tar.zst
